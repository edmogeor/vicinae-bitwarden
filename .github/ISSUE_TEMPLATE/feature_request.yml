name: Feature request
description: Suggest an enhancement to the Bitwarden extension
title: '[Feature]: '
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please search [existing issues](https://github.com/edmogeor/vicinae-bitwarden/issues?q=is%3Aissue) first to avoid duplicates.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What's the underlying problem or use case? (Not the proposed solution.)
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: textarea
    id: additional
    attributes:
      label: Additional context
