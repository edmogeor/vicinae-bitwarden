name: Sync to Vicinae Store

on:
  workflow_run:
    workflows: ['Release']
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.3.0)'
        required: true
        type: string

jobs:
  sync:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag and ref
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "ref=refs/tags/${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"
            echo "ref=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout extension at release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.ref }}

      - name: Checkout store fork
        uses: actions/checkout@v4
        with:
          repository: edmogeor/extensions
          path: store
          token: ${{ secrets.STORE_REPO_PAT }}

      - name: Copy extension into store
        run: |
          rm -rf store/extensions/bitwarden
          mkdir -p store/extensions/bitwarden
          cp -r package.json package-lock.json tsconfig.json CHANGELOG.md README.md assets src store/extensions/bitwarden/

      - name: Push to store fork
        run: |
          cd store
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add extensions/bitwarden
          git diff --cached --quiet || git commit -m "bitwarden ${{ steps.meta.outputs.tag }}"
          git push origin main

      - name: Create or update store PR
        run: |
          cd store
          TAG="${{ steps.meta.outputs.tag }}"
          VERSION="${TAG#v}"
          CHANGELOG=$(awk -v ver="$VERSION" '
            BEGIN { found=0 }
            /^## \[/ {
              if (found) exit
              if ($0 ~ "## \\[" ver "\\]") found=1
            }
            found { print }
          ' ../CHANGELOG.md | sed '1d')
          EXISTING=$(gh pr list --repo vicinaehq/extensions --head edmogeor:main --state open --json number --jq '.[0].number')
          TITLE="Extension update: Bitwarden $TAG"
          BODY=$(printf 'Release %s\n\n%s' "$TAG" "$CHANGELOG")
          if [ -n "$EXISTING" ]; then
            gh pr edit "$EXISTING" --repo vicinaehq/extensions --title "$TITLE" --body "$BODY"
          else
            gh pr create --repo vicinaehq/extensions --head edmogeor:main --base main --title "$TITLE" --body "$BODY"
          fi
        env:
          GH_TOKEN: ${{ secrets.STORE_REPO_PAT }}
