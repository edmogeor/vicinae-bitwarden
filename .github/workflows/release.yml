name: Release

on:
  push:
    tags:
      - 'v*'
      - '[0-9]+.[0-9]+.[0-9]+*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract release notes
        id: extract_release_notes
        uses: ffurrer2/extract-release-notes@v2

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.extract_release_notes.outputs.release_notes }}

  sync:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout extension at release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Checkout store fork
        uses: actions/checkout@v4
        with:
          repository: edmogeor/extensions
          path: store
          token: ${{ secrets.STORE_REPO_PAT }}

      - name: Copy extension into store
        run: |
          rm -rf store/extensions/bitwarden
          mkdir -p store/extensions/bitwarden
          cp -r package.json package-lock.json tsconfig.json CHANGELOG.md README.md assets src store/extensions/bitwarden/

      - name: Resolve sync commit message
        run: |
          TAG="${{ github.ref_name }}"
          SUBJECT="$(git tag -l --format='%(contents:subject)' "$TAG")"
          BODY="$(git tag -l --format='%(contents:body)' "$TAG")"
          if [ -n "$SUBJECT" ]; then
            printf '%s\n' "$SUBJECT" > "$RUNNER_TEMP/sync-msg.txt"
            if [ -n "$BODY" ]; then
              printf '\n%s\n' "$BODY" >> "$RUNNER_TEMP/sync-msg.txt"
            fi
          else
            printf 'chore(bitwarden): release %s\n' "$TAG" > "$RUNNER_TEMP/sync-msg.txt"
          fi

      - name: Push to store fork
        run: |
          cd store
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add extensions/bitwarden
          git diff --cached --quiet || git commit -F "$RUNNER_TEMP/sync-msg.txt"
          git push origin main
